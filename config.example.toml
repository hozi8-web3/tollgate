# config.toml — place at ~/.lct/config.toml or pass with --config

[proxy]
port = 4000
host = "127.0.0.1"

[dashboard]
port      = 4001
auto_open = true          # open browser on startup

[providers.anthropic]
api_key_env = "ANTHROPIC_API_KEY"
base_url    = "https://api.anthropic.com"

[providers.openai]
api_key_env = "OPENAI_API_KEY"
base_url    = "https://api.openai.com"

[providers.groq]
api_key_env = "GROQ_API_KEY"
base_url    = "https://api.groq.com/openai"

[routing]
cost_optimize            = false
max_cost_per_request_usd = 0.50    # block requests over this

[[routing.rules]]
if_prompt_contains = "classify"
use_model          = "claude-haiku-4-5-20251001"
use_provider       = "anthropic"
reason             = "Classification tasks are cheap on Haiku"

[[routing.rules]]
if_prompt_contains = "translate"
use_model          = "gpt-4o-mini"
use_provider       = "openai"
reason             = "Translation is fast and cheap on 4o-mini"

[storage]
db_path        = "~/.lct/usage.db"
retention_days = 90

[alerts]
anomaly_multiplier = 3.0          # flag if cost > 3x rolling average
daily_budget_usd   = 5.00         # log warning if daily spend exceeds this
